{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>Create EcoTrack Account</h2>
    <form method="POST" action="/register">
        <div style="margin-bottom: 15px;">
            <label>Full Name:</label><br>
            <input type="text" name="name" required style="width: 100%; padding: 8px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Email:</label><br>
            <input type="email" name="email" required style="width: 100%; padding: 8px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Password:</label><br>
            <input type="password" name="password" required minlength="6" style="width: 100%; padding: 8px;">
        </div>
        <button type="submit" style="background: #2e7d32; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%;">
            Sign Up
        </button>
    </form>
    <p style="margin-top: 15px;">Already have an account? <a href="/login">Login here</a></p>
</div>
{% endblock %}
