{% extends "base.html" %}

{% block content %}
<div id="forest-root"></div>
{% endblock %}

{% block scripts %}
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <script type="text/babel" data-presets="env,react,typescript" data-cache="false" src="{{ url_for('static', filename='components/EcoGlobe.js') }}"></script>

    <script type="text/babel" data-presets="env,react,typescript">
        const root = ReactDOM.createRoot(document.getElementById('forest-root'));
        root.render(<ForestGlobe />);
    </script>
    
    <script>
        window.currentUserName = "{{ session.user_name }}";
    </script>
{% endblock %}
